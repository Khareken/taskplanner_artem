name: taskplanner
description: Performance tracker with gamification - complete tasks, earn coins, extend deadlines.
publish_to: 'none'
version: 2.1.0+3

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  provider: ^6.1.1
  intl: ^0.18.1
  flutter_slidable: ^3.0.1
  uuid: ^4.2.1
  shared_preferences: ^2.2.2
  flutter_animate: ^4.3.0
  google_fonts: ^6.1.0
  percent_indicator: ^4.2.3
  table_calendar: ^3.0.9
  
  # Firebase
  firebase_core: ^3.8.1
  firebase_remote_config: ^5.3.0
  
  # AppsFlyer
  appsflyer_sdk: ^6.15.3
  
  # OneSignal Push
  onesignal_flutter: ^5.2.7
  
  # WebView
  webview_flutter: ^4.10.0
  
  # Utils
  device_info_plus: ^11.2.0
  package_info_plus: ^8.1.2
  connectivity_plus: ^6.1.1
  app_tracking_transparency: ^2.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
